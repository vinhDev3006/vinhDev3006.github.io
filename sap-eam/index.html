          role:'Materials / Procurement', color:'#b45309',
          steps:[
            step(4,'Identify long-lead materials','IW32','amber','Pull BOM to RESB. Identify items >8 week lead time for early procurement'),
            arr(),
            step(5,'Convert reservations to POs','ME21N','amber','Procurement raises POs. Materials staged at dedicated shutdown store location'),
            arr(),
            step(6,'Confirm material readiness','MMBE','amber','Stock confirmed at shutdown storage location before execution window opens'),
          ]
        },
        {
          role:'Supervisor / Scheduler', color:'#0369a1',
          steps:[
            step(7,'Capacity level & resource plan','CM01','blue','Load level across trades. Identify contractor gaps. Publish daily job schedule'),
            arr(),
            step(8,'Permit-to-work coordination','—','blue','Isolations, lock-out/tag-out, confined space permits issued per order'),
            arr(),
            step(9,'Mass release all orders','IW38','blue','Release all shutdown orders simultaneously at outage start'),
          ]
        },
        {
          role:'Technician / Contractor', color:'#0f766e',
          steps:[
            step(10,'Execute & confirm work','IW41','teal','Technicians confirm each operation. Defect notifications raised for any scope additions'),
            arr(),
            step(11,'Quality inspection sign-off','QA01','teal','Critical jobs require quality notification and inspection lot completion'),
          ]
        },
        {
          role:'Planner / Controller', color:'#c2410c',
          steps:[
            step(12,'TECO all orders & settle to WBS','KO88','coral','Mass TECO via IW38. Batch settlement allocates all costs to WBS/Fixed Asset'),
            arr(),
            step(13,'Post-shutdown analysis','S_ALR','coral','Actual vs planned hours, cost variance, defect list, lessons learned for next TAR'),
          ]
        }
      ],
      kpis:['TAR cost variance vs budget','Wrench time % from IW41','Overrun hours by trade']
    },

    /* ══════════════════════════════════════════════════════════
       SCENARIO 4 — Condition-Based Maintenance (CBM)
    ══════════════════════════════════════════════════════════ */
    {
      icon:'📊', color:'teal',
      title:'Condition-Based Maintenance (CBM / PdM)',
      sub:'Maintenance triggered by measured equipment condition exceeding defined thresholds',
      trigger:'Trigger: Measurement reading exceeds threshold (vibration, temperature, pressure, runtime hours)',
      statusFlow:[
        {code:'Reading recorded',bg:'var(--teal-l)',fg:'var(--teal)'},
        {code:'Threshold breach',bg:'var(--amber-l)',fg:'var(--amber)'},
        {code:'Notification raised',bg:'var(--blue-l)',fg:'var(--blue)'},
        {code:'Order created',bg:'var(--purple-l)',fg:'var(--purple)'},
        {code:'Intervention done',bg:'var(--green-l)',fg:'var(--green)'}
      ],
      lanes:[
        {
          role:'Reliability / Instrumentation', color:'#0f766e',
          steps:[
            step(1,'Define measurement points','IK01','teal','Create measurement point on equipment. Set characteristic (vibration mm/s), upper/lower limits'),
            arr(),
            step(2,'Record condition reading','IK11','teal','Manual entry or IoT/PI integration. Reading stored in IMRG against IMPTT point'),
            arr(),
            step(3,'System evaluates threshold','IK11','teal','If reading outside limits → SAP auto-creates notification or flags for review'),
          ]
        },
        {
          role:'Reliability Engineer', color:'#6d28d9',
          steps:[
            step(4,'Analyse trend data','IK17','purple','Review measurement history chart. Confirm degradation trend vs. single anomaly'),
            arr(),
            step(5,'Decide intervention type','—','purple','Minor adjustment vs. planned replacement vs. immediate shutdown — risk-based decision'),
            arr(),
            arr(),
          ]
        },
        {
          role:'Maintenance Planner', color:'#b45309',
          steps:[
            step(6,'Create corrective notification','IW21','amber','Reference measurement point and reading value in notification long text'),
            arr(),
            step(7,'Plan intervention order','IW31','amber','PM01 order with specific operations for the identified failure mode. Attach CBM report'),
            arr(),
            step(8,'Source condition-specific parts','ME21N','amber','Order specialist components (bearings, seals) based on exact failure diagnosis'),
          ]
        },
        {
          role:'Technician (Execution)', color:'#0f766e',
          steps:[
            step(9,'Execute targeted repair','—','teal','Precision intervention based on failure diagnosis — not generic PM task list'),
            arr(),
            step(10,'Post-repair measurement','IK11','teal','Record new baseline reading to confirm repair effectiveness. Reset threshold monitoring'),
          ]
        },
        {
          role:'Reliability Engineer', color:'#6d28d9',
          steps:[
            step(11,'Update maintenance strategy','IP11','purple','Adjust PM interval based on actual degradation rate observed from CBM data'),
            arr(),
            step(12,'Close loop — update FMEA','—','purple','Document failure mode, root cause, and effectiveness of intervention in FMEA register'),
          ]
        }
      ],
      kpis:['PdM coverage % of critical assets','False positive rate from thresholds','Defect-to-repair lead time']
    }

  ];

  /* ── Render ─────────────────────────────────────────────── */
  function renderScenario(sc){
    var c=COLORS[sc.color];
    var hd='<div class="biz-scenario-hd">'+
      '<div class="bs-icon" style="background:'+c.bg+';color:'+c.fg+'">'+sc.icon+'</div>'+
      '<div><div class="bs-title" style="color:'+(c.dk||c.fg)+'">'+sc.title+'</div>'+
      '<div class="bs-sub">'+sc.sub+'</div></div>'+
      '<div class="bs-trigger">'+sc.trigger+'</div>'+
    '</div>';

    /* Status lifecycle bar */
    var sf='<div class="biz-status-flow">';
    sf+='<span style="font-size:10px;font-weight:600;color:var(--text3);margin-right:10px;white-space:nowrap">Order lifecycle:</span>';
    sc.statusFlow.forEach(function(s,i){
      sf+=status(s.code,s.bg,s.fg);
      if(i<sc.statusFlow.length-1)sf+=sa();
    });
    sf+='</div>';

    /* Swimlanes */
    var grid='<div class="biz-swimlanes">';
    sc.lanes.forEach(function(lane){
      grid+='<div class="biz-lane">'+
        '<div class="biz-lane-label">'+
          '<div class="role-dot" style="background:'+lane.color+'"></div>'+
          lane.role+
        '</div>'+
        '<div class="biz-lane-steps">'+lane.steps.filter(function(s,i){var isArrow=s.indexOf('biz-arrow')!==-1||s.indexOf('biz-decision')!==-1;return !(isArrow&&i===lane.steps.length-1);}).join('')+'</div>'+
      '</div>';
    });
    grid+='</div>';

    /* KPI footer */
    var footer='<div class="biz-footer"><span class="kpi-label">&#x1F4CA; Key metrics:</span>'+
      sc.kpis.map(function(k){return '<span class="kpi-chip" style="background:'+c.bg+';color:'+c.fg+'">'+k+'</span>';}).join('')+
    '</div>';

    return '<div class="biz-scenario">'+hd+sf+grid+footer+'</div>';
  }

  return '<p class="section-desc">End-to-end SAP EAM business operation workflows — roles, steps, SAP transactions, and KPIs for each scenario. Hover any step for details.</p>'+
    '<div class="legend-bar">'+
    '<span class="tag" style="background:var(--blue-l);color:var(--blue)">🔧 Corrective</span>'+
    '<span class="tag" style="background:var(--amber-l);color:var(--amber)">📅 Preventive</span>'+
    '<span class="tag" style="background:var(--purple-l);color:var(--purple)">🏭 Shutdown/TAR</span>'+
    '<span class="tag" style="background:var(--teal-l);color:var(--teal)">📊 Condition-based</span>'+
    '</div>'+
    '<div class="biz-wrap">'+scenarios.map(renderScenario).join('')+'</div>';
}

/* ============================================================ TAB SWITCH */
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  document.querySelector('.tab-btn[onclick="switchTab(\''+tab+'\')"]').classList.add('active');
  var sec=document.getElementById('sec-'+tab);
  sec.classList.add('active');
  closeDetail();closeErd();
  var mc=document.getElementById('mainContent');if(mc)mc.scrollTop=0;
  if(!sec.dataset.rendered){
    sec.dataset.rendered='1';
    if(tab==='org'){sec.innerHTML=renderOrg();initCcHighlight('org');}
    if(tab==='tech'){sec.innerHTML=renderTech();initCcHighlight('tech');}
    if(tab==='proc'){sec.innerHTML=renderProc();initCcHighlight('proc');}
    if(tab==='prev'){sec.innerHTML=renderPrev();initCcHighlight('prev');}
    if(tab==='erd'){sec.innerHTML=renderErd();initErdHighlight();}
    if(tab==='biz')sec.innerHTML=renderBiz();
  }
}

/* ============================================================ DETAIL PANEL */
function showDetail(id){
  var d=ALL[id];if(!d)return;var c=COLORS[d.color];
  var qC={What:"#2563eb",Why:"#15803d",Who:"#b45309",When:"#c2410c",Where:"#6d28d9",How:"#be185d"};
  var qs=[{q:"What",l:"What is it?",b:d.what},{q:"Why",l:"Why is it needed?",b:d.why},{q:"Who",l:"Who is responsible?",b:d.who},{q:"When",l:"When is it configured?",b:d.when},{q:"Where",l:"Where in SAP?",b:d.where},{q:"How",l:"How to set it up?",b:d.how}];
  var p=document.getElementById('detailPanel');
  p.className='detail-panel show';
  p.innerHTML='<div class="dh"><div class="icon" style="background:'+c.bg+';color:'+c.fg+'">'+d.icon+'</div><div class="info"><h2 style="color:'+(c.dk||c.fg)+'">'+d.title+'</h2><p>5W1H breakdown &middot; Blueprinting reference</p></div><div class="cb" onclick="closeDetail()">&#x2715;</div></div><div class="dg">'+qs.map(function(x){return '<div class="dc"><div class="cl"><span class="q" style="background:'+qC[x.q]+'">'+x.q[0]+'</span> '+x.l+'</div><div class="cb2">'+x.b+'</div></div>';}).join('')+'</div><div class="de"><div class="row">'+d.tcodes.map(function(t){return '<span class="chip" style="background:var(--bg2);color:var(--text2)"><span style="font-family:IBM Plex Mono,monospace;font-size:10px">'+t+'</span></span>';}).join('')+d.tables.map(function(t){return '<span class="chip" style="background:'+c.bg+';color:'+c.fg+'">Table: '+t+'</span>';}).join('')+'</div><p class="tip">&#x1F4A1; '+d.tips+'</p></div>';
  document.querySelectorAll('.org-card').forEach(function(el){el.classList.remove('active')});
  var ac=document.querySelector('.org-card[data-id="'+id+'"]');if(ac)ac.classList.add('active');
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeDetail(){document.getElementById('detailPanel').className='detail-panel';document.querySelectorAll('.org-card').forEach(function(el){el.classList.remove('active')});}

/* ============================================================ ERD POPUP */
function showErd(key){
  var t=ERD[key];if(!t)return;var c=COLORS[t.color];
  var domL={org:"Organizational",tech:"Technical objects",proc:"Maint. processing",prev:"Preventive maintenance"};
  var flds=t.fields.map(function(f){
    var b='';
    if(f.k.indexOf('PK')>=0)b+='<span class="badge" style="background:var(--amber-l);color:var(--amber)">PK</span>';
    if(f.k.indexOf('FK')>=0)b+='<span class="badge" style="background:var(--blue-l);color:var(--blue)">FK</span>';
    return '<div class="ef">'+b+'<span style="color:var(--text)">'+f.n+'</span></div>';
  }).join('');
  var rls=t.rels.map(function(r){return '<div class="eri"><span class="ar">&#x2192;</span><span>'+r+'</span></div>';}).join('');
  var p=document.getElementById('edp');
  var o=document.getElementById('eov');
  p.innerHTML='<div class="eh"><h3 style="color:'+(c.dk||c.fg)+'">'+t.name+'</h3><span class="eb" style="background:'+c.bg+';color:'+c.fg+'">'+(domL[t.domain]||t.domain)+'</span><div class="cb" onclick="closeErd()" style="margin-left:auto">&#x2715;</div></div><div class="ed">'+t.desc+'</div><div class="es"><h4>Key fields</h4>'+flds+'</div><div class="er"><h4>Relationships &amp; joins</h4>'+rls+'</div>';
  p.className='edp show';o.className='eov show';
  document.querySelectorAll('.erd-tbl').forEach(function(el){el.classList.remove('ea')});
  var ac=document.querySelector('.erd-tbl[data-t="'+key+'"]');if(ac)ac.classList.add('ea');
}
function closeErd(){document.getElementById('edp').className='edp';document.getElementById('eov').className='eov';document.querySelectorAll('.erd-tbl').forEach(function(el){el.classList.remove('ea')});}

switchTab('org');initCcHighlight('org');
</script>
