<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP S/4HANA EAM</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f5f4f0;--bg2:#eae8e3;--card:#fff;--text:#1a1a1a;--text2:#555;--text3:#888;
--accent:#2563eb;--accent-light:#dbeafe;--accent-dark:#1e40af;
--purple:#6d28d9;--purple-l:#ede9fe;--purple-d:#4c1d95;
--blue:#0369a1;--blue-l:#e0f2fe;--blue-d:#0c4a6e;
--teal:#0f766e;--teal-l:#ccfbf1;--teal-d:#134e4a;
--coral:#c2410c;--coral-l:#fff7ed;--coral-d:#7c2d12;
--green:#15803d;--green-l:#dcfce7;--green-d:#14532d;
--amber:#b45309;--amber-l:#fef3c7;--amber-d:#78350f;
--pink:#be185d;--pink-l:#fce7f3;--pink-d:#831843;
--red:#dc2626;--red-l:#fee2e2;--red-d:#7f1d1d;
--line:#c4c0b8;
--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
--shadow-hover:0 4px 16px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){:root{
--bg:#151515;--bg2:#1e1e1e;--card:#222;--text:#e8e6e1;--text2:#a8a8a8;--text3:#6a6a6a;
--accent:#60a5fa;--accent-light:#1e3a5f;--accent-dark:#93c5fd;
--purple-l:#2e1065;--purple-d:#c4b5fd;--purple:#a78bfa;
--blue-l:#0c3547;--blue-d:#7dd3fc;--blue:#38bdf8;
--teal-l:#103836;--teal-d:#5eead4;--teal:#2dd4bf;
--coral-l:#3b1a08;--coral-d:#fdba74;--coral:#fb923c;
--green-l:#0f2e18;--green-d:#86efac;--green:#4ade80;
--amber-l:#3b2506;--amber-d:#fcd34d;--amber:#fbbf24;
--pink-l:#3b0a25;--pink-d:#f9a8d4;--pink:#f472b6;
--red-l:#3b1010;--red-d:#fca5a5;--red:#f87171;
--line:#3a3a3a;
--shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
--shadow-hover:0 4px 20px rgba(0,0,0,.4);
}}
/* ── Desktop app shell ─────────────────────────────────────────────── */
*{box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;line-height:1.6;display:flex;flex-direction:column;margin:0;padding:0}

/* Top bar */
.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--card);border-bottom:1.5px solid var(--line);flex-shrink:0;z-index:50}
.topbar h1{font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.topbar .sub{font-size:11px;color:var(--text2);white-space:nowrap}
.topbar .badge{display:inline-block;background:var(--accent-light);color:var(--accent);font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.topbar .spacer{flex:1}

/* Main layout: sidebar + content */
.shell{display:flex;flex:1;overflow:hidden}

/* Left sidebar nav */
.sidebar{width:200px;flex-shrink:0;background:var(--card);border-right:1.5px solid var(--line);display:flex;flex-direction:column;padding:12px 8px;gap:2px;overflow-y:auto}
.sidebar-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:10px 10px 4px;margin-top:4px}
.tab-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border:none;background:transparent;border-radius:8px;font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;text-align:left;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:var(--bg2)}
.tab-btn.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.tab-btn .ti{font-size:15px;flex-shrink:0}
.tab-btn .tc{margin-left:auto;font-size:9px;background:var(--bg2);padding:1px 6px;border-radius:8px;font-weight:600}
.tab-btn.active .tc{background:var(--accent);color:#fff}

/* Content area */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 32px 60px}

/* Legacy compat */
.page{width:100%}
header{display:none}
.tab-bar{display:none}

.section{display:none}.section.active{display:block}
.section-desc{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;max-width:900px}
.legend-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px}
.legend-bar .tag{font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;letter-spacing:.3px}
.diagram{display:flex;flex-direction:column;align-items:center;gap:0}
.tier{display:flex;justify-content:center;gap:12px;width:100%;flex-wrap:wrap}
.connector-v{width:2px;height:28px;background:var(--line);margin:0 auto;position:relative}
.connector-v::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--line)}
.connector-v .label{position:absolute;right:-38px;top:4px;font-size:10px;color:var(--text3);font-weight:500;white-space:nowrap;font-family:'IBM Plex Mono',monospace}
.org-card{background:var(--card);border-radius:10px;border:1.5px solid var(--line);cursor:pointer;transition:all .2s;box-shadow:var(--shadow);overflow:hidden;width:260px;min-width:200px}
.org-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.org-card.active{border-color:var(--accent)}
.org-card .ch{padding:12px 14px 8px;display:flex;align-items:center;gap:8px}
.org-card .ci{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.org-card .ct{font-size:13px;font-weight:600;line-height:1.3}
.org-card .cw{font-size:11px;color:var(--text2);padding:0 14px 8px;line-height:1.5}
.org-card .cc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);padding:0 14px 8px}
.detail-panel{background:var(--card);border-radius:12px;border:1.5px solid var(--line);box-shadow:var(--shadow);margin-top:28px;overflow:hidden;display:none;animation:fu .25s ease}
.detail-panel.show{display:block}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.dh{padding:18px 22px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.dh .icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dh .info h2{font-size:18px;font-weight:700}
.dh .info p{font-size:12px;color:var(--text2)}
.cb{margin-left:auto;width:30px;height:30px;border-radius:7px;border:1px solid var(--line);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2)}
.cb:hover{background:var(--bg2);color:var(--text)}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:0}
.dc{padding:16px 20px;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.dc:nth-child(even){border-right:none}
.dc .cl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.dc .cl .q{width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.dc .cb2{font-size:12px;color:var(--text2);line-height:1.65}
.de{padding:14px 20px;background:var(--bg);border-top:1px solid var(--line)}
.de .row{display:flex;gap:8px;flex-wrap:wrap}
.de .chip{font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px}
.de .tip{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6}
.dashed-group{border:1.5px dashed var(--line);border-radius:14px;padding:18px 14px 14px;position:relative;margin-top:4px;width:100%}
.dashed-group .gl{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--bg);padding:0 10px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.dashed-group .it{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.flow-row{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;margin:6px 0}
.fa{color:var(--line);font-size:20px;padding:0 2px;flex-shrink:0}
/* ERD */
.erd-wrap{overflow:auto;padding:10px 0 40px;max-height:calc(100vh - 160px)}
.erd-canvas{position:relative;min-height:850px}
.erd-domain{position:absolute;border:1.5px dashed var(--line);border-radius:14px;padding:36px 12px 12px}
.erd-domain-label{position:absolute;top:-11px;left:16px;background:var(--bg);padding:0 10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.erd-tbl{position:absolute;background:var(--card);border-radius:8px;border:1.5px solid var(--line);box-shadow:var(--shadow);width:170px;cursor:pointer;transition:all .2s;overflow:hidden;font-size:12px;z-index:5}
.erd-tbl:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px);z-index:20}
.erd-tbl.ea{border-color:var(--accent);z-index:20}
.erd-tbl.hl-active{border-color:var(--accent);z-index:20;box-shadow:0 0 0 2px var(--accent-light),var(--shadow-hover)}
.erd-tbl.hl-dim{opacity:.35}
.erd-tbl.hl-pinned{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light),var(--shadow-hover);z-index:25}
.erd-tbl .th2{padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:5px}
.erd-tbl .th2 .dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.erd-tbl .td2{padding:3px 10px;font-size:9px;color:var(--text2);border-bottom:1px solid var(--line);line-height:1.4}
.erd-tbl .tf{padding:3px 10px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--text2);display:flex;align-items:center;gap:3px;line-height:1.6}
.erd-tbl .tf:last-child{padding-bottom:5px}
.erd-tbl .tf .pk{color:var(--amber);font-weight:700;font-size:8px}
.erd-tbl .tf .fk{color:var(--blue);font-weight:600;font-size:8px}
.erd-tbl .tf .fn{color:var(--text)}
.erd-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:1}
.erd-hit-svg{position:absolute;top:0;left:0;overflow:visible;z-index:15;pointer-events:none}
.erd-hit-svg .rel-line-hit{pointer-events:all}
/* Improved line transitions */
.rel-line{transition:opacity .18s,stroke-width .18s}
.rel-line-hit{fill:none;stroke:transparent;stroke-width:14;cursor:pointer}
.rel-line-hit:hover~.rel-line,.rel-line-hit:hover{opacity:1}
.line-tooltip{
  position:fixed;pointer-events:none;z-index:900;
  background:var(--card);border:1.5px solid var(--line);
  border-radius:8px;padding:8px 12px;box-shadow:var(--shadow-hover);
  font-size:11px;font-family:'IBM Plex Mono',monospace;
  opacity:0;transition:opacity .12s;white-space:nowrap;
}
.line-tooltip.show{opacity:1}
.line-tooltip .lt-from{font-weight:700}
.line-tooltip .lt-card{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin:0 2px}
.line-tooltip .lt-rel{color:var(--text3);font-size:10px;margin:0 4px}
.eov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:999;display:none}
.eov.show{display:block}
.edp{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border-radius:12px;border:1.5px solid var(--line);box-shadow:0 12px 40px rgba(0,0,0,.15);z-index:1000;max-width:520px;width:92vw;max-height:80vh;overflow-y:auto;display:none;animation:fu .2s ease}
.edp.show{display:block}
.edp .eh{padding:14px 18px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.edp .eh h3{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.edp .eh .eb{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.edp .ed{padding:10px 18px;font-size:12px;color:var(--text2);line-height:1.6;border-bottom:1px solid var(--line)}
.edp .es{padding:10px 18px}
.edp .es h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:6px}
.edp .ef{display:flex;align-items:center;gap:5px;padding:3px 0;font-size:11px;font-family:'IBM Plex Mono',monospace;border-bottom:1px solid var(--bg2)}
.edp .ef .badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;font-family:'IBM Plex Sans',sans-serif}
.edp .er{padding:10px 18px 16px}
.edp .er h4{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:6px}
.edp .eri{font-size:11px;color:var(--text2);padding:3px 0;line-height:1.5;border-bottom:1px solid var(--bg2);display:flex;gap:5px;align-items:baseline}
.edp .eri .ar{color:var(--accent);font-weight:600;font-size:13px;flex-shrink:0}
/* ── Business Operations ───────────────────────────────────────────── */
.biz-wrap{width:100%;padding:0 0 60px}
.biz-scenario{background:var(--card);border:1.5px solid var(--line);border-radius:14px;margin-bottom:32px;overflow:hidden;box-shadow:var(--shadow)}
.biz-scenario-hd{padding:16px 22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line)}
.biz-scenario-hd .bs-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.biz-scenario-hd .bs-title{font-size:16px;font-weight:700}
.biz-scenario-hd .bs-sub{font-size:11px;color:var(--text2);margin-top:2px}
.biz-scenario-hd .bs-trigger{margin-left:auto;font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--bg2);color:var(--text3);flex-shrink:0}
/* Status bar */
.biz-status-flow{display:flex;gap:0;align-items:center;padding:10px 22px;background:var(--bg);border-bottom:1px solid var(--line);flex-wrap:wrap;gap:2px}
.biz-status{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;font-family:"IBM Plex Mono",monospace;letter-spacing:.3px;white-space:nowrap}
.biz-status-arrow{color:var(--line);font-size:12px;padding:0 4px;flex-shrink:0}
/* Swimlanes — vertical list layout */
.biz-swimlanes{display:flex;flex-direction:column}
.biz-lane{display:flex;align-items:stretch;border-bottom:1px solid var(--line)}
.biz-lane:last-child{border-bottom:none}
.biz-lane-label{width:180px;flex-shrink:0;padding:14px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);background:var(--bg);border-right:1px solid var(--line);display:flex;align-items:flex-start;gap:8px;padding-top:16px}
.biz-lane-label .role-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:2px}
.biz-lane-steps{flex:1;padding:14px 20px;display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;gap:4px}
/* Step box — now unconstrained width, grows naturally */
.biz-step{display:flex;align-items:center;gap:4px}
.biz-step-box{background:var(--bg);border:1.5px solid var(--line);border-radius:8px;padding:8px 13px;font-size:12px;font-weight:500;line-height:1.4;position:relative;cursor:default;transition:all .15s;white-space:nowrap}
.biz-step-box:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px);border-color:var(--accent)}
.biz-step-box .step-tcode{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;margin-top:3px;display:block;opacity:.7}
.biz-step-box .step-num{position:absolute;top:-8px;left:-8px;width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}
.biz-arrow{width:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--line);font-size:16px}
.biz-decision-box{background:var(--bg);border:1.5px dashed var(--line);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;cursor:default}
/* Footer */
.biz-footer{padding:10px 22px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--bg2);border-top:1px solid var(--line)}
.biz-footer .kpi-chip{font-size:10px;padding:3px 9px;border-radius:4px;font-weight:500}
.biz-footer .kpi-label{font-size:10px;color:var(--text3);margin-right:4px}
/* mobile styles removed — desktop app */
</style>
</head>
<body>
<!-- Top bar -->
<div class="topbar">
  <span style="font-size:22px;line-height:1">⚙️</span>
  <div style="display:flex;flex-direction:column;gap:1px">
    <h1>SAP S/4HANA — EAM / Plant Maintenance</h1>
    <span class="sub">Organizational, process &amp; data model reference — 5W1H blueprinting</span>
  </div>
  <div class="spacer"></div>
  <span class="badge">Click any element for details</span>
</div>

<!-- Shell -->
<div class="shell">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-label">Master Data</div>
    <button class="tab-btn active" onclick="switchTab('org')">
      <span class="ti">🏛️</span>Org structure<span class="tc">8</span>
    </button>
    <button class="tab-btn" onclick="switchTab('tech')">
      <span class="ti">⚙️</span>Technical objects<span class="tc">5</span>
    </button>
    <div class="sidebar-label">Processes</div>
    <button class="tab-btn" onclick="switchTab('proc')">
      <span class="ti">🔧</span>Maint. processing<span class="tc">5</span>
    </button>
    <button class="tab-btn" onclick="switchTab('prev')">
      <span class="ti">📅</span>Preventive maint.<span class="tc">4</span>
    </button>
    <button class="tab-btn" onclick="switchTab('biz')">
      <span class="ti">🏭</span>Business operations<span class="tc">4</span>
    </button>
    <div class="sidebar-label">Reference</div>
    <button class="tab-btn" onclick="switchTab('erd')">
      <span class="ti">🗄️</span>Table relationships<span class="tc">22</span>
    </button>
  </nav>

  <!-- Content -->
  <div class="content" id="mainContent">
    <div id="sec-org" class="section active"></div>
    <div id="sec-tech" class="section"></div>
    <div id="sec-proc" class="section"></div>
    <div id="sec-prev" class="section"></div>
    <div id="sec-erd" class="section"></div>
    <div id="sec-biz" class="section"></div>
    <div class="detail-panel" id="detailPanel"></div>
  </div>
</div>

<div class="eov" id="eov" onclick="closeErd()"></div>
<div class="edp" id="edp"></div>
<script>
const COLORS={purple:{bg:"var(--purple-l)",fg:"var(--purple)",dk:"var(--purple-d)"},blue:{bg:"var(--blue-l)",fg:"var(--blue)",dk:"var(--blue-d)"},teal:{bg:"var(--teal-l)",fg:"var(--teal)",dk:"var(--teal-d)"},coral:{bg:"var(--coral-l)",fg:"var(--coral)",dk:"var(--coral-d)"},green:{bg:"var(--green-l)",fg:"var(--green)",dk:"var(--green-d)"},amber:{bg:"var(--amber-l)",fg:"var(--amber)",dk:"var(--amber-d)"},pink:{bg:"var(--pink-l)",fg:"var(--pink)",dk:"var(--pink-d)"},red:{bg:"var(--red-l)",fg:"var(--red)",dk:"var(--red-d)"}};

const ALL={
client:{id:"client",title:"Client",icon:"\u{1F3DB}",color:"purple",what:"The highest organizational unit in SAP. Represents the entire corporate group. All master data and configuration exist within a Client.",why:"Provides complete data isolation between environments (Prod, QA, Dev). Ensures data never leaks between company groups.",who:"SAP Basis administrators. System architects define client strategy. Rarely changed after go-live.",when:"Defined once during initial system installation (SCC4). Typically Client 100=Prod, 200=QA, 300=Dev.",where:"SAP system settings. Visible on every login screen. Affects all modules.",how:"Created via SCC4. Client copies (SCC5/SCCL) duplicate configuration between clients.",tcodes:["SCC4","SCC5","SCCL"],tables:["T000"],tips:"Use 3 clients minimum: Dev, QA, Prod. Never modify Client 000 (SAP reference)."},
companycode:{id:"companycode",title:"Company Code",icon:"\u{1F3E2}",color:"blue",what:"An independent legal entity for which complete financial statements can be produced. Central unit of Financial Accounting (FI).",why:"Required by law for statutory financial reporting. In EAM, determines which entity bears maintenance costs.",who:"Finance/Controlling teams define Company Codes. CFO is business owner. EAM consultants align with blueprinting.",when:"Defined during org structure design (OX02). Rarely changed post go-live.",where:"SPRO \u2192 Enterprise Structure \u2192 Definition \u2192 Financial Accounting.",how:"Create via OX02 or copy via EC01. Assign to Controlling Area (OKKP). Assign Plants via OX18.",tcodes:["OX02","EC01","OX18","OBY6"],tables:["T001","T001B"],tips:"1 Company Code : N Plants. A Plant belongs to exactly one Company Code."},
plant:{id:"plant",title:"Plant",icon:"\u{1F3ED}",color:"teal",what:"An operational unit within a Company Code. In EAM/PM, the Plant is the central hub linking to all maintenance structures.",why:"Separates operational data by physical location or business division. Enables independent maintenance management per site.",who:"Operations/Plant Managers are business owners. Defined during blueprinting with logistics and maintenance teams.",when:"Configured during org structure setup (OX10). Assigned to Company Code via OX18. Must exist before technical objects.",where:"SPRO \u2192 Enterprise Structure \u2192 Definition \u2192 Logistics \u2013 General. Visible in IW21, IE01, IL01.",how:"Create via OX10. Key settings: name, address, factory calendar. Can be both Maintenance Planning Plant and Maintenance Plant.",tcodes:["OX10","OX18","EC01"],tables:["T001W","T001K"],tips:"Consider a Central Planning Plant model for multi-site organizations."},
maint_plan_plant:{id:"maint_plan_plant",title:"Maint. Planning Plant",icon:"\u{1F4CB}",color:"coral",what:"The Plant responsible for planning and scheduling all maintenance activities. Holds task lists, maintenance plans, Planner Groups.",why:"Enables centralized planning across multiple executing plants. One team can plan for many factories.",who:"Maintenance Planners and Managers. They create plans, task lists, schedule work.",when:"Assigned during org structure config in SPRO. Specified on every plan, task list, and equipment master.",where:"SPRO \u2192 Plant Maintenance \u2192 Maintenance Plans / Task Lists. Referenced in IP01, IA01, IE01.",how:"Any Plant can be designated. Assign on technical objects and plans. Configure Planner Groups via IR01.",tcodes:["IP01","IP02","IP10","IA01","IR01"],tables:["MPLA","PLKO"],tips:"Use one central Planning Plant for standardized strategies. Doesn't need to be the physical location."},
maint_plant:{id:"maint_plant",title:"Maintenance Plant",icon:"\u{1F527}",color:"coral",what:"The Plant where maintenance work is physically executed. Where technicians, tools, and workshop resources are located.",why:"Separates where work is planned from where it is done. Enables accurate cost tracking per location.",who:"Technicians, Supervisors, Workshop Managers. They execute orders, record confirmations, manage resources.",when:"Assigned on equipment and functional location masters. Derived automatically when orders are created.",where:"Specified on equipment (IE01) and functional locations (IL01). Visible in IW31/IW32.",how:"Any Plant can serve. Assign on technical object master. Work Centers and spare parts are assigned here.",tcodes:["IW31","IW32","IW41","IE01","IL01"],tables:["AUFK","ILOA","EQUI"],tips:"Planning Plant \u2260 Maintenance Plant = central planning + local execution."},
storage_loc:{id:"storage_loc",title:"Storage Location",icon:"\u{1F4E6}",color:"green",what:"A subdivision of a Plant where spare parts and consumables are physically stored.",why:"Enables precise inventory tracking at warehouse/stockroom level. Minimizes downtime.",who:"Warehouse Managers, Store Keepers, Maintenance Planners.",when:"Defined during org structure setup. Referenced every time goods are issued for maintenance.",where:"SPRO \u2192 Materials Management. Visible in MMBE, MB1A/MIGO, IW31 components.",how:"Created via OX09. Each belongs to one Plant. Extend materials via MM01.",tcodes:["OX09","MMBE","MB1A","MIGO","MM01"],tables:["T001L","MARD"],tips:"Create a dedicated PM Store per plant to separate maintenance from production materials."},
work_center:{id:"work_center",title:"Work Center",icon:"\u{1F477}",color:"pink",what:"A resource or group of resources (people, machines, tools) for maintenance. Defines capacity, cost rates, and skills.",why:"Backbone of capacity planning and costing. Defines available hours, hourly rates, qualifications.",who:"Maintenance Managers and HR. Mapped by crew or trade (WC-ELEC, WC-MECH).",when:"Created before task lists and orders. Defined during blueprinting (IR01). Referenced in every operation.",where:"IR01. Assigned to a Plant. Linked to Cost Center and Activity Type.",how:"Create IR01. Key: Plant, category 0001, Cost Center, Activity Type, capacity, scheduling formulas.",tcodes:["IR01","IR02","IR03","CR05","CR07"],tables:["CRHD","CRCO","KAKO"],tips:"Structure by trade. Set realistic capacity. Link to correct Cost Center."},
planner_group:{id:"planner_group",title:"Planner Group",icon:"\u{1F4D0}",color:"amber",what:"A code for a person or team responsible for planning maintenance within a Planning Plant.",why:"Provides accountability and workload distribution. Enables filtering and planning KPIs.",who:"Maintenance Planners. One group per planner or trade team.",when:"Defined during org setup. Assigned to equipment, plans, and orders. Used daily.",where:"SPRO \u2192 PM \u2192 Planner Groups. Referenced in IW31/32, IP01, IE01.",how:"3-character code with description. Assigned to a Planning Plant. Filter via IW38/IW39.",tcodes:["IR01","IW38","IW39","IP01","IE01"],tables:["T024I"],tips:"One per planner or discipline. IW38 with Planner Group filter = daily worklist."},
func_loc:{id:"func_loc",title:"Functional Location",icon:"\u{1F4CD}",color:"purple",what:"Hierarchical representation of WHERE maintenance happens. E.g., Plant-Area-System-Position. Structured multi-level indicator.",why:"Stable location-based structure for maintenance history. Even when equipment moves, history stays at the location.",who:"Maintenance Engineers design hierarchy during blueprinting. Plant Managers approve.",when:"Defined during master data setup (IL01). Hierarchy designed before any data load.",where:"IL01-IL03, IL05, IL06. Tables IFLO, IFLOT, ILOA, TPLNR.",how:"Design hierarchy first (3-4 levels). Define structure indicators in SPRO (OIBB). Create via IL01.",tcodes:["IL01","IL02","IL03","IL05","IL06","OIBB"],tables:["IFLO","IFLOT","ILOA","TPLNR"],tips:"Design on paper first. 3-4 levels max. Naming convention cannot change after creation."},
equipment:{id:"equipment",title:"Equipment",icon:"\u2699\uFE0F",color:"blue",what:"An individual physical asset maintained independently. Represents WHAT is maintained. Each carries unique history, serial number, specs.",why:"Tracks history, costs, performance per asset. Enables MTBF, MTTR, TCO analysis. Required for regulatory traceability.",who:"Maintenance Engineers create masters. Asset Managers track lifecycle. Technicians reference during work.",when:"Created after Functional Locations. IE01 during master data loading. Updated through lifecycle.",where:"IE01-IE03, IE05, IE07. Tables EQUI, EQUZ, ILOA, EQST.",how:"IE01: category, description, Maint/Planning Plant, Planner Group, Cost Center, Functional Location, manufacturer, serial.",tcodes:["IE01","IE02","IE03","IE05","IE07","IE4N"],tables:["EQUI","EQUZ","ILOA","EQST"],tips:"Always install at a Functional Location. Use Classification for technical attributes."},
bom:{id:"bom",title:"Maintenance BOM",icon:"\u{1F5C2}",color:"teal",what:"Structured list of spare parts and components needed to maintain equipment or functional location.",why:"Ensures right parts available. Drives MRP. Standardizes material usage. Auto-populates order components.",who:"Maintenance Engineers create. Material Managers maintain part numbers. Planners reference.",when:"After equipment and material masters exist. Updated when equipment modified.",where:"IB01-IB03, CS01-CS03. Tables STKO (header), STPO (items), MAST.",how:"IB01 for Equipment BOM, CS01 for Material BOM. Assign materials, quantities, item categories.",tcodes:["IB01","IB02","IB03","IB08","CS01","CS03"],tables:["STKO","STPO","MAST"],tips:"Create for critical assets. Item category L=stock, N=non-stock. Keep updated."},
serial_num:{id:"serial_num",title:"Serial Number",icon:"\u{1F522}",color:"coral",what:"Unique identifier for individual material items enabling piece-level traceability. Can link to equipment.",why:"Required for regulatory compliance (FDA, aviation). Enables warranty tracking, recall management.",who:"Material Managers set profiles. Warehouse assigns at goods receipt. Technicians record at installation.",when:"Profile in MM01. Numbers assigned at MIGO. Referenced in orders.",where:"IQ01-IQ03, MM01, MIGO. Tables SER01, SERI, OBJK.",how:"Enable on material master (MM01 Serial Profile). Assign at goods receipt. Auto-create equipment optionally.",tcodes:["IQ01","IQ02","IQ03","MM01","MIGO"],tables:["SER01","SERI","OBJK","EQUI"],tips:"Only serialize high-value or safety-critical items. Use profile PPPP for auto-equipment."},
class_char:{id:"class_char",title:"Classification",icon:"\u{1F3F7}",color:"green",what:"System for structured technical attributes via classes and characteristics. E.g., pump with Flow Rate, Pressure, Material.",why:"Enables technical searches, standardized specs, spare parts matching, catalog-based failure recording.",who:"Maintenance Engineers define classes/chars. Technical Planners assign to objects.",when:"Defined in Realize phase (CL02, CT04). Assigned to equipment/functional locations during master data load.",where:"CL02, CT04, CL20N, CLFM. Tables KLAH, KSSK, AUSP, CABN.",how:"Define characteristics (CT04), create classes (CL02), assign objects via Classification tab.",tcodes:["CL02","CT04","CL20N","CLFM","IE01"],tables:["KLAH","KSSK","AUSP","CABN"],tips:"Start with 10-15 chars per class. Standardize units. Same hierarchy for equipment and spares."},
notification:{id:"notification",title:"Notification",icon:"\u{1F514}",color:"purple",what:"Document to report maintenance events — malfunctions, damage, requests. Entry point for corrective maintenance. Types: M1, M2, M3.",why:"Captures structured problem reports: what failed, damage code, where. Enables failure trending and KPIs.",who:"Anyone creates — operators, technicians, supervisors. Planners review and convert to orders.",when:"Created when problem detected. Processed in planning meetings. Completed after work done.",where:"IW21-IW23, IW28, IW29. Tables QMEL, QMFE, QMUR, QMSM.",how:"IW21: select type, enter description, assign object, add damage codes. Convert to order. Complete when done.",tcodes:["IW21","IW22","IW23","IW28","IW29","IW68"],tables:["QMEL","QMFE","QMUR","QMSM"],tips:"Configure catalog profiles (QS41). Enforce mandatory fields. Train operators."},
maint_order:{id:"maint_order",title:"Maintenance Order",icon:"\u{1F4DD}",color:"blue",what:"Document authorizing, planning, and tracking maintenance work. Contains operations, components, costs, scheduling. Types: PM01-PM04.",why:"Central work document. No orders = no cost tracking, no history, no capacity planning.",who:"Planners create/plan. Supervisors schedule/release. Technicians execute/confirm. Controllers settle.",when:"Created from notification or directly (IW31). Lifecycle: CRTD → REL → CNF → TECO → CLSD.",where:"IW31-33, IW38. Tables AUFK, AFKO, AFVC, RESB, AFRU.",how:"IW31: type, object, operations+work center, components from BOM, schedule, release. Confirm IW41. Settle KO88.",tcodes:["IW31","IW32","IW33","IW38","IW41","IW44","KO88"],tables:["AUFK","AFKO","AFVC","RESB","AFRU"],tips:"Always confirm orders. IW38 = daily worklist. Set up auto-settlement batch."},
confirmation:{id:"confirmation",title:"Confirmation",icon:"\u2705",color:"teal",what:"Records actual work against order operations. Captures hours, dates, findings, measurements. Critical feedback loop.",why:"Without it: no actual costs, no labor history, no KPIs. Drives MTTR, wrench time, utilization.",who:"Technicians create. Supervisors review. Time Admins may batch-confirm.",when:"During/after work. Can be partial or final. Final triggers CNF status.",where:"IW41 (individual), IW42/IW44 (collective). Tables AFRU, AFVV, JEST.",how:"IW41: order/operation, actual hours, dates, final flag, text. IW44 for batch. Integrate with CATS.",tcodes:["IW41","IW42","IW44","IW45","CATS","IW47"],tables:["AFRU","AFVV","JEST"],tips:"Make simple for technicians. Use Fiori mobile. Confirmations drive KPIs and budgets."},
settlement:{id:"settlement",title:"Settlement",icon:"\u{1F4B0}",color:"amber",what:"Allocates order costs to receivers — Cost Center, Asset, WBS. Bridges PM and CO/FI.",why:"Orders are temporary cost collectors. Without settlement, costs never reach financial reports.",who:"Controlling defines rules. EAM configures defaults. Settlement runs as batch.",when:"Rules set at order creation. Actual run at period-end or TECO. Before period close.",where:"KO88 (individual), CO88 (batch). Rules on order (IW32). Config in SPRO/CO.",how:"Default per order type (e.g., PM01 → 100% equipment Cost Center). Run KO88 or CO88 batch.",tcodes:["KO88","CO88","KOB1","IW32","S_ALR_87013611"],tables:["COBK","COEP","COSP","AUFK"],tips:"Configure defaults so planners skip manual setup. Run monthly batch. Capital maint → AuC."},
maint_history:{id:"maint_history",title:"Maint. History",icon:"\u{1F4CA}",color:"coral",what:"Accumulated record of all maintenance on a technical object — notifications, orders, confirmations, measurements, costs.",why:"Most valuable EAM output. Enables MTBF/MTTR, failure patterns, predictive strategies, audit trails.",who:"Everyone consumes. Reliability Engineers analyze. Planners review. Managers justify budgets.",when:"Built automatically from completed notifications, confirmed orders, recorded measurements.",where:"IE03/IL03 → History. IW69, IW65. Tables QMEL, AUFK, AFRU, IMRG.",how:"No creation — built by closing notifications, confirming orders, recording measurements. Extract to BW.",tcodes:["IW69","IW65","IE03","IL03","IW28","IW38"],tables:["QMEL","AUFK","AFRU","IMRG","JEST"],tips:"Quality depends on data capture discipline. Enforce catalog codes. Quarterly failure reviews."},
task_list:{id:"task_list",title:"Task List",icon:"\u{1F4C3}",color:"purple",what:"Predefined sequence of maintenance operations reused across orders and plans. Standardizes procedures.",why:"Consistency, reduced planning time, OEM/safety compliance.",who:"Maintenance Engineers create from OEM manuals and best practices.",when:"After Work Centers and BOMs exist. Referenced by plans. Updated when procedures change.",where:"IA01-IA03, IA05, IA11. Tables PLKO, PLPO, PLMZ, PLAS.",how:"IA01: Planning Plant, operations+work center+duration, materials. Assign to plans via IP01.",tcodes:["IA01","IA02","IA03","IA05","IA06","IA11"],tables:["PLKO","PLPO","PLMZ","PLAS"],tips:"Use general task lists (IA11) for common procedures. 5-15 steps. Always assign materials."},
maint_plan_prev:{id:"maint_plan_prev",title:"Maintenance Plan",icon:"\u{1F4C5}",color:"blue",what:"Automated scheduling rule generating orders/notifications at intervals. Single Cycle or Strategy Plan.",why:"Automates PM scheduling. Ensures nothing missed. Without it, all PM is manual.",who:"Planners create/manage. Reliability Engineers define intervals. Supervisors monitor compliance.",when:"After task lists and strategies exist. IP10 runs daily/weekly as batch.",where:"IP01-IP03, IP10, IP24. Tables MPLA, MPOS, MHIS, MHIO.",how:"IP01: type, cycle/strategy, items+object+task list, start date. IP10/IP30 generates orders.",tcodes:["IP01","IP02","IP03","IP10","IP30","IP24"],tables:["MPLA","MPOS","MHIS","MHIO"],tips:"IP10/IP30 as daily batch = PM heartbeat. 30-day call horizon. Strategy plans for multi-interval."},
maint_strategy:{id:"maint_strategy",title:"Maint. Strategy",icon:"\u{1F504}",color:"teal",what:"Rule set defining multiple maintenance cycles. E.g., Pkg 1=3 months, Pkg 2=12 months. Each package can have a different task list.",why:"Models real-world multi-interval programs. Without it, you need separate plans per interval.",who:"Reliability Engineers design. SAP consultants configure in SPRO. Planners assign to plans.",when:"Defined during configuration before plans. Rarely changed. Reviewed annually.",where:"SPRO or IP11. Tables STRA, STRAT, STRP.",how:"IP11: scheduling indicator, packages with cycles/units. Set hierarchy. Assign to plans.",tcodes:["IP11","IP12","IP13","IP01","SPRO"],tables:["STRA","STRAT","STRP"],tips:"Match OEM schedules. Use hierarchy to skip lower packages. 4-6 packages max. Name clearly."},
meas_point:{id:"meas_point",title:"Measurement Point",icon:"\u{1F4CF}",color:"amber",what:"Defines a parameter to measure on equipment (vibration, pressure, hours). Measurement documents record readings. Enables CBM.",why:"Transforms from time-based to condition-based maintenance. Enables trend analysis and predictive strategies.",who:"Reliability Engineers define parameters/thresholds. Technicians record readings. CM teams analyze.",when:"Points created during master data setup. Readings recorded during inspections or via IoT.",where:"IK01, IK11, IK17. Tables IMPTT, IMRG, IMPT, IMRC.",how:"IK01: position, characteristic, unit, limits on equipment. IK11: record readings. Link to plans for counter-based scheduling.",tcodes:["IK01","IK02","IK07","IK11","IK17","IK18"],tables:["IMPTT","IMRG","IMPT","IMRC"],tips:"Start with runtime hours on critical equipment. Set realistic limits. Integrate IoT."}
};

/* ============================================================ HELPERS */
function card(id){const d=ALL[id];if(!d)return '';const c=COLORS[d.color];
return '<div class="org-card" data-id="'+d.id+'" onclick="showDetail(\''+d.id+'\')"><div class="ch"><div class="ci" style="background:'+c.bg+';color:'+c.fg+'">'+d.icon+'</div><div class="ct" style="color:'+(c.dk||c.fg)+'">'+d.title+'</div></div><div class="cw">'+d.what.split('.')[0]+'.</div><div class="cc">'+d.tcodes.slice(0,3).join(' / ')+'</div></div>';}
function connV(l){return '<div class="connector-v">'+(l?'<div class="label">'+l+'</div>':'')+'</div>';}
function spread(n,w){var s=w||620,h=44,m=s/2,p=[];if(n===3)p=[s*.16,s*.5,s*.84];else if(n===2)p=[s*.28,s*.72];var li=p.map(function(x){return '<line x1="'+m+'" y1="0" x2="'+x+'" y2="'+(h-8)+'" stroke="var(--line)" stroke-width="2"/><polygon points="'+(x-5)+','+(h-8)+' '+(x+5)+','+(h-8)+' '+x+','+h+'" fill="var(--line)"/>';}).join('');return '<svg width="'+s+'" height="'+h+'" viewBox="0 0 '+s+' '+h+'" style="display:block;margin:0 auto">'+li+'</svg>';}

/* ============================================================ SECTION RENDERS — shared canvas engine */

var CC_W=220,CC_H=110;

function ccCard(id,pos){
  var d=ALL[id];if(!d)return '';
  var c=COLORS[d.color],p=pos[id];if(!p)return '';
  var onclick='onclick="showDetail(\'' + id + '\')"';
  return '<div class="erd-tbl cc-card" style="left:'+p.x+'px;top:'+p.y+'px;width:'+CC_W+'px" '+onclick+' data-t="'+id+'">'+
    '<div class="th2" style="background:'+c.bg+';color:'+c.fg+'"><div class="dot" style="background:'+c.fg+'"></div>'+
    '<span style="font-size:11px">'+d.icon+'</span> '+d.title+'</div>'+
    '<div class="td2" style="font-size:10px;padding:5px 10px;line-height:1.5;color:var(--text2)">'+d.what.split('.')[0]+'.</div>'+
    '<div class="td2" style="font-family:IBM Plex Mono,monospace;font-size:9px;padding:3px 10px 6px;color:var(--text3)">'+d.tcodes.slice(0,3).join(' · ')+'</div>'+
  '</div>';
}

function ccAnch(id,side,pos,off){
  var p=pos[id];if(!p)return{x:0,y:0};
  var w=CC_W,h=CC_H,o=off||0,hw=w*0.28,hh=h*0.28;
  if(side==='t')return{x:p.x+w/2+o*hw,y:p.y};
  if(side==='b')return{x:p.x+w/2+o*hw,y:p.y+h};
  if(side==='l')return{x:p.x,y:p.y+h/2+o*hh};
  if(side==='r')return{x:p.x+w,y:p.y+h/2+o*hh};
  return{x:p.x+w/2,y:p.y+h/2};
}

function renderCanvas(cfg){
  var pos=cfg.pos,rels=cfg.rels,cw=cfg.cw,ch=cfg.ch,secId=cfg.secId;
  var TW=CC_W,TH=CC_H,MARGIN=20,R=7,GAP=20;

  function getObs(fk,tk){
    return Object.keys(pos).filter(function(k){return k!==fk&&k!==tk;}).map(function(k){
      var p=pos[k];return{x1:p.x-6,y1:p.y-6,x2:p.x+TW+6,y2:p.y+TH+6};
    });
  }
  function segBlocked(x1,y1,x2,y2,obs){
    var PAD=4;
    for(var i=0;i<obs.length;i++){
      var r=obs[i],ox1=r.x1-PAD,oy1=r.y1-PAD,ox2=r.x2+PAD,oy2=r.y2+PAD;
      if(Math.abs(x1-x2)<0.5){var mnY=Math.min(y1,y2),mxY=Math.max(y1,y2);if(x1>ox1&&x1<ox2&&mxY>oy1+1&&mnY<oy2-1)return true;}
      else{var mnX=Math.min(x1,x2),mxX=Math.max(x1,x2);if(y1>oy1&&y1<oy2&&mxX>ox1+1&&mnX<ox2-1)return true;}
    }
    return false;
  }
  function snap(arr,v){var b=arr[0],bd=Math.abs(arr[0]-v);arr.forEach(function(x){var d=Math.abs(x-v);if(d<bd){bd=d;b=x;}});return b;}
  function simp(pts){
    if(pts.length<3)return pts;
    var o=[pts[0]];
    for(var i=1;i<pts.length-1;i++){var p=pts[i-1],c=pts[i],n=pts[i+1];if(!((p[0]===c[0]&&c[0]===n[0])||(p[1]===c[1]&&c[1]===n[1])))o.push(c);}
    o.push(pts[pts.length-1]);return o;
  }
  function bldPts(pts){
    if(pts.length<2)return{d:'',mx:0,my:0,pts:pts};
    var d='M'+pts[0][0]+','+pts[0][1];
    for(var i=1;i<pts.length-1;i++){
      var p=pts[i-1],c=pts[i],n=pts[i+1];
      var dx1=c[0]-p[0],dy1=c[1]-p[1],dx2=n[0]-c[0],dy2=n[1]-c[1];
      var l1=Math.sqrt(dx1*dx1+dy1*dy1),l2=Math.sqrt(dx2*dx2+dy2*dy2),r=Math.min(R,l1/2,l2/2);
      if(r<1){d+=' L'+c[0]+','+c[1];continue;}
      var bx0=c[0]-r*(dx1/l1),by0=c[1]-r*(dy1/l1),ex0=c[0]+r*(dx2/l2),ey0=c[1]+r*(dy2/l2);
      d+=' L'+bx0.toFixed(1)+','+by0.toFixed(1)+' Q'+c[0]+','+c[1]+' '+ex0.toFixed(1)+','+ey0.toFixed(1);
    }
    d+=' L'+pts[pts.length-1][0]+','+pts[pts.length-1][1];
    var mid=Math.floor(pts.length/2);
    return{d:d,mx:(pts[mid-1][0]+pts[mid][0])/2,my:(pts[mid-1][1]+pts[mid][1])/2,pts:pts};
  }
  function route(ax,ay,bx,by,fs,ts,fk,tk){
    var obs=getObs(fk,tk);
    var ex=ax,ey=ay,nx=bx,ny=by;
    if(fs==='r')ex=ax+MARGIN;else if(fs==='l')ex=ax-MARGIN;else if(fs==='b')ey=ay+MARGIN;else ey=ay-MARGIN;
    if(ts==='l')nx=bx-MARGIN;else if(ts==='r')nx=bx+MARGIN;else if(ts==='t')ny=by-MARGIN;else ny=by+MARGIN;
    var xSet=new Set(),ySet=new Set();
    [ax,ex,bx,nx].forEach(function(v){xSet.add(Math.round(v));});
    [ay,ey,by,ny].forEach(function(v){ySet.add(Math.round(v));});
    Object.keys(pos).forEach(function(k){
      var p=pos[k];
      xSet.add(Math.round(p.x-GAP));xSet.add(Math.round(p.x+TW+GAP));
      ySet.add(Math.round(p.y-GAP));ySet.add(Math.round(p.y+TH+GAP));
      xSet.add(Math.round(p.x+TW/2));ySet.add(Math.round(p.y+TH/2));
    });
    var xs=Array.from(xSet).sort(function(a,b){return a-b;});
    var ys=Array.from(ySet).sort(function(a,b){return a-b;});
    var W=xs.length,H=ys.length;
    var si=xs.indexOf(snap(xs,ex)),sj=ys.indexOf(snap(ys,ey));
    var ti=xs.indexOf(snap(xs,nx)),tj=ys.indexOf(snap(ys,ny));
    if(si<0||sj<0||ti<0||tj<0)return bldPts(simp([[ax,ay],[ex,ey],[ex,ny],[nx,ny],[bx,by]]));
    var start=sj*W+si,goal=tj*W+ti;
    if(start===goal)return bldPts([[ax,ay],[bx,by]]);
    var dist=new Array(W*H).fill(Infinity),prev=new Array(W*H).fill(-1);
    var dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    dist[start]=0;var queue=[start],qi=0;
    while(qi<queue.length){
      var cur=queue[qi++];if(cur===goal)break;
      var ci=cur%W,cj=Math.floor(cur/W),cx=xs[ci],cy=ys[cj];
      for(var d=0;d<4;d++){
        var ni=ci+dirs[d][0],nj=cj+dirs[d][1];
        if(ni<0||ni>=W||nj<0||nj>=H)continue;
        var nid=nj*W+ni;if(dist[nid]!==Infinity)continue;
        if(segBlocked(cx,cy,xs[ni],ys[nj],obs))continue;
        dist[nid]=dist[cur]+1;prev[nid]=cur;queue.push(nid);
      }
    }
    var pts=[];
    if(dist[goal]===Infinity){pts=[[ax,ay],[ex,ey],[ex,ny],[nx,ny],[bx,by]];}
    else{var node=goal;while(node!==-1){pts.unshift([xs[node%W],ys[Math.floor(node/W)]]);node=prev[node];}
      if(pts[0][0]!==ax||pts[0][1]!==ay)pts.unshift([ax,ay]);
      if(pts[pts.length-1][0]!==bx||pts[pts.length-1][1]!==by)pts.push([bx,by]);}
    return bldPts(simp(pts));
  }

  var placed=[];
  function pickLbl(pts,allR){
    if(!pts||pts.length<2)return{mx:0,my:0};
    var best=-Infinity,bx=0,by=0,PERP=10;
    for(var i=1;i<pts.length-2;i++){
      var p=pts[i],q=pts[i+1],dx=q[0]-p[0],dy=q[1]-p[1],len=Math.sqrt(dx*dx+dy*dy);
      if(len<20)continue;
      var isH=Math.abs(dy)<Math.abs(dx),mx=(p[0]+q[0])/2,my=(p[1]+q[1])/2;
      var cands=isH?[[mx,my-PERP],[mx,my+PERP]]:[[mx+PERP,my],[mx-PERP,my]];
      cands.forEach(function(pp){
        var px=pp[0],py=pp[1],minD=Infinity;
        allR.forEach(function(r){var ddx=Math.max(0,Math.max(r.x1-px,px-r.x2)),ddy=Math.max(0,Math.max(r.y1-py,py-r.y2));minD=Math.min(minD,Math.sqrt(ddx*ddx+ddy*ddy));});
        if(minD<2)return;
        var sep=placed.length?Math.min.apply(null,placed.map(function(l){return Math.sqrt(Math.pow(l.x-px,2)+Math.pow(l.y-py,2));})):80;
        var score=(Math.min(minD,60)/60)*0.5+(Math.min(sep,80)/80)*0.3+(Math.min(len,200)/200)*0.2;
        if(score>best){best=score;bx=isH?mx:px;by=isH?py:my;}
      });
    }
    if(best===-Infinity){var m=Math.floor(pts.length/2);bx=(pts[m-1][0]+pts[m][0])/2;by=(pts[m-1][1]+pts[m][1])/2;}
    placed.push({x:bx,y:by});return{mx:bx,my:by};
  }

  placed=[];
  var allRects=Object.keys(pos).map(function(k){var p=pos[k];return{x1:p.x,y1:p.y,x2:p.x+TW,y2:p.y+TH};});
  var svgL='',svgLbl='',svgHits='';
  var defs='<defs>'+
    '<marker id="cc-ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">'+
    '<path d="M0,0.5 L0,5.5 L5.5,3 Z" fill="context-stroke"/></marker>'+
    '</defs>';

  /* Pre-compute spread offsets so no two lines share the exact same anchor point.
     For each (cardKey, side) pair, count how many lines use it and assign
     evenly spaced offsets in [-0.5, +0.5]. */
  var sideCount={};   /* key = "cardId|side" → total count */
  var sideIndex={};   /* key = "cardId|side" → next index */
  rels.forEach(function(r){
    var fKey=r[0]+'|'+r[3], tKey=r[1]+'|'+r[4];
    sideCount[fKey]=(sideCount[fKey]||0)+1;
    sideCount[tKey]=(sideCount[tKey]||0)+1;
  });
  function autoOff(cardId,side){
    var key=cardId+'|'+side;
    var n=sideCount[key]||1;
    var idx=sideIndex[key]||0;
    sideIndex[key]=idx+1;
    if(n===1)return 0;
    /* spread evenly across [-0.55, +0.55] */
    return -0.55 + idx*(1.1/(n-1));
  }

  rels.forEach(function(r){
    var fk=r[0],tk=r[1],lbl=r[2],fs=r[3],ts=r[4];
    /* use manual offsets if provided, otherwise auto-spread */
    var fo = autoOff(fk,fs);
    var to2= autoOff(tk,ts);
    var a=ccAnch(fk,fs,pos,fo),b=ccAnch(tk,ts,pos,to2);
    var fd=ALL[fk];var cv=fd?'var(--'+fd.color+')':'var(--teal)';
    var bp=route(a.x,a.y,b.x,b.y,fs,ts,fk,tk);
    var lp=pickLbl(bp.pts||[[a.x,a.y],[b.x,b.y]],allRects);
    var lw=lbl.length*5.8+12;
    svgHits+='<path class="rel-line-hit cc-hit" data-from="'+fk+'" data-to="'+tk+'" data-card="'+lbl+'" d="'+bp.d+'"/>';
    svgL+='<path class="rel-line cc-line" data-from="'+fk+'" data-to="'+tk+'" d="'+bp.d+'" style="stroke:'+cv+';color:'+cv+';fill:none" stroke-width="1.8" opacity=".55" marker-end="url(#cc-ah)" stroke-linecap="round" stroke-linejoin="round" pointer-events="none"/>';
    svgLbl+='<g class="rel-lbl cc-lbl" data-from="'+fk+'" data-to="'+tk+'" pointer-events="none" style="transition:opacity .18s;opacity:.9">'+
      '<rect x="'+(lp.mx-lw/2)+'" y="'+(lp.my-8.5)+'" width="'+lw+'" height="16" rx="3" style="fill:var(--card);stroke:'+cv+'" stroke-width="0.8"/>'+
      '<text x="'+lp.mx+'" y="'+(lp.my+4.5)+'" text-anchor="middle" font-size="9" font-weight="600" font-family="IBM Plex Mono,monospace" style="fill:'+cv+'">'+lbl+'</text>'+
    '</g>';
  });

  var cards=Object.keys(pos).map(function(k){return ccCard(k,pos);}).join('');
  return '<p class="section-desc">'+cfg.desc+'</p>'+
    '<div class="legend-bar">'+cfg.legend+'</div>'+
    '<div class="erd-wrap"><div class="erd-canvas" style="width:'+cw+'px;height:'+ch+'px" id="cc-canvas-'+secId+'">'+
      '<svg class="erd-svg" width="'+cw+'" height="'+ch+'" viewBox="0 0 '+cw+' '+ch+'">'+defs+svgL+svgLbl+'</svg>'+
      cards+
      '<svg class="erd-hit-svg" width="'+cw+'" height="'+ch+'" viewBox="0 0 '+cw+' '+ch+'">'+svgHits+'</svg>'+
    '</div></div>';
}

function initCcHighlight(secId){
  var wrap=document.getElementById('cc-canvas-'+secId);if(!wrap)return;
  var lines=wrap.querySelectorAll('.cc-line');
  var hits=wrap.querySelectorAll('.cc-hit');
  var tbls=wrap.querySelectorAll('.erd-tbl');
  var lbls=wrap.querySelectorAll('.cc-lbl');
  var tooltip=document.getElementById('lineTooltip');
  var pinned=null;
  function applyCard(key){
    lines.forEach(function(l){var c=l.dataset.from===key||l.dataset.to===key;l.style.opacity=c?'1':'0.05';l.style.strokeWidth=c?'2.8':'1.8';});
    lbls.forEach(function(l){var c=l.dataset.from===key||l.dataset.to===key;l.style.opacity=c?'1':'0.05';});
    tbls.forEach(function(t){
      if(t.dataset.t===key){t.classList.remove('hl-dim');return;}
      var linked=false;
      lines.forEach(function(l){if((l.dataset.from===key&&l.dataset.to===t.dataset.t)||(l.dataset.to===key&&l.dataset.from===t.dataset.t))linked=true;});
      t.classList.toggle('hl-active',linked);t.classList.toggle('hl-dim',!linked);
    });
  }
  function applyLine(from,to){
    lines.forEach(function(l){var m=l.dataset.from===from&&l.dataset.to===to;l.style.opacity=m?'1':'0.05';l.style.strokeWidth=m?'3':'1.8';});
    lbls.forEach(function(l){var m=l.dataset.from===from&&l.dataset.to===to;l.style.opacity=m?'1':'0.05';});
    tbls.forEach(function(t){var e=t.dataset.t===from||t.dataset.t===to;t.classList.toggle('hl-active',e);t.classList.toggle('hl-dim',!e);});
  }
  function resetAll(){
    lines.forEach(function(l){l.style.opacity='0.55';l.style.strokeWidth='1.8';});
    lbls.forEach(function(l){l.style.opacity='0.9';});
    tbls.forEach(function(t){t.classList.remove('hl-active','hl-dim','hl-pinned');});
    if(tooltip)tooltip.className='line-tooltip';
  }
  function showTip(from,to,card,e){
    if(!tooltip)return;
    var fd=ALL[from]||{},td=ALL[to]||{};
    var fc=COLORS[fd.color||'teal'],tc=COLORS[td.color||'teal'];
    tooltip.innerHTML='<span class="lt-card" style="background:'+fc.bg+';color:'+fc.fg+'">'+fd.title+'</span>'+
      '<span class="lt-rel">'+card+'</span>'+
      '<span class="lt-card" style="background:'+tc.bg+';color:'+tc.fg+'">'+td.title+'</span>'+
      (e?'<span style="color:var(--text3);margin-left:8px;font-size:9px">(click to pin)</span>':'');
    tooltip.className='line-tooltip show';
    if(e){var x=e.clientX+14,y=e.clientY-36;if(x+280>window.innerWidth)x=e.clientX-290;if(y<8)y=e.clientY+16;tooltip.style.left=x+'px';tooltip.style.top=y+'px';tooltip.style.transform='none';}
  }
  tbls.forEach(function(el){
    el.addEventListener('click',function(ev){ev.stopPropagation();
      var key=this.dataset.t;
      if(pinned&&pinned.type==='card'&&pinned.key===key){pinned=null;resetAll();return;}
      pinned={type:'card',key:key};tbls.forEach(function(t){t.classList.remove('hl-pinned');});
      el.classList.add('hl-pinned');applyCard(key);if(tooltip)tooltip.className='line-tooltip';
    });
    el.addEventListener('mouseenter',function(){if(pinned)return;applyCard(this.dataset.t);});
    el.addEventListener('mouseleave',function(){if(pinned)return;resetAll();});
  });
  hits.forEach(function(hit){
    hit.addEventListener('click',function(ev){ev.stopPropagation();
      var from=this.dataset.from,to=this.dataset.to,card=this.dataset.card;
      if(pinned&&pinned.type==='line'&&pinned.from===from&&pinned.to===to){pinned=null;resetAll();return;}
      pinned={type:'line',from:from,to:to,card:card};tbls.forEach(function(t){t.classList.remove('hl-pinned');});
      applyLine(from,to);showTip(from,to,card,null);
      if(tooltip){tooltip.style.left='50%';tooltip.style.top='80px';tooltip.style.transform='translateX(-50%)';}
    });
    hit.addEventListener('mouseenter',function(e){if(pinned)return;applyLine(this.dataset.from,this.dataset.to);showTip(this.dataset.from,this.dataset.to,this.dataset.card,e);});
    hit.addEventListener('mousemove',function(e){if(pinned)return;var x=e.clientX+14,y=e.clientY-36;if(x+280>window.innerWidth)x=e.clientX-290;if(y<8)y=e.clientY+16;if(tooltip){tooltip.style.left=x+'px';tooltip.style.top=y+'px';tooltip.style.transform='none';}});
    hit.addEventListener('mouseleave',function(){if(pinned)return;resetAll();if(tooltip)tooltip.className='line-tooltip';});
  });
  wrap.addEventListener('click',function(){if(pinned){pinned=null;resetAll();tbls.forEach(function(t){t.classList.remove('hl-pinned');});}});
}

/* ============================================================ ERD */
function renderErd(){
  var tblPos={
    /* ── ORG master data (top-left) ── */
    T000    :{x:20,   y:40},
    T001    :{x:20,   y:194},
    T001W   :{x:240,  y:40},
    T001L   :{x:240,  y:236},
    MARD    :{x:240,  y:411},
    T024I   :{x:460,  y:40},
    CRHD    :{x:460,  y:215},
    CRCO    :{x:460,  y:411},
    /* ── Technical objects (top-right) ── */
    IFLO    :{x:690,  y:40},
    ILOA    :{x:690,  y:317},
    EQUI    :{x:910,  y:40},
    MAST    :{x:910,  y:320},
    STKO    :{x:910,  y:537},
    KLAH    :{x:1130, y:40},
    KSSK    :{x:1130, y:215},
    STPO    :{x:1130, y:390},
    /* ── Maintenance processing (bottom-left) ── */
    QMEL    :{x:20,   y:818},
    QMFE    :{x:20,   y:1056},
    AUFK    :{x:240,  y:818},
    AFKO    :{x:240,  y:1056},
    AFVC    :{x:460,  y:818},
    RESB    :{x:460,  y:1056},
    AFRU    :{x:460,  y:1315},
    COBK    :{x:680,  y:818},
    COEP    :{x:680,  y:1014},
    /* ── Preventive maintenance (bottom-right) ── */
    PLKO    :{x:910,  y:818},
    PLPO    :{x:910,  y:1035},
    PLMZ    :{x:910,  y:1294},
    MPLA    :{x:1130, y:818},
    MPOS    :{x:1130, y:1035},
    MHIS    :{x:1130, y:1273},
    STRA    :{x:1350, y:818},
    STRAT_P :{x:1350, y:993},
    IMPTT   :{x:1570, y:818},
    IMRG    :{x:1570, y:1035}
  };

  var domains=[
    {label:"Organizational master data",            x:0,   y:0,   w:650, h:628, color:"teal"},
    {label:"Technical objects",                     x:670, y:0,   w:650, h:733, color:"purple"},
    {label:"Maintenance processing (transactional)",x:0,   y:798, w:870, h:755, color:"blue"},
    {label:"Preventive maintenance",                x:890, y:798, w:870, h:734, color:"amber"}
  ];

  /* domain → CSS var name */
  var domVar={org:"teal",tech:"purple",proc:"blue",prev:"amber"};

  function tblH(k){var t=ERD[k];return t?32+20+t.fields.length*21+4:90;}

  /* off: -1..+1 spreads anchor away from centre along the side */
  function anch(k,s,off){
    var p=tblPos[k];if(!p)return{x:0,y:0};
    var w=170,h=tblH(k),o=off||0;
    var hw=w*0.28,hh=h*0.28;
    if(s==='t')return{x:p.x+w/2+o*hw, y:p.y};
    if(s==='b')return{x:p.x+w/2+o*hw, y:p.y+h};
    if(s==='l')return{x:p.x,           y:p.y+h/2+o*hh};
    if(s==='r')return{x:p.x+w,         y:p.y+h/2+o*hh};
    return{x:p.x+w/2,y:p.y+h/2};
  }

  /* ── Orthogonal obstacle-avoiding router ──────────────────────────────
     Uses a grid of candidate X and Y coordinates derived from card edges,
     then runs BFS over orthogonal moves to find the shortest clear path.
  ──────────────────────────────────────────────────────────────────── */
  var TW=170;
  function tblRect(k){
    var p=tblPos[k],h=tblH(k);
    return{x1:p.x,y1:p.y,x2:p.x+TW,y2:p.y+h};
  }
  function rectHit(rx1,ry1,rx2,ry2,px,py){
    return px>rx1&&px<rx2&&py>ry1&&py<ry2;
  }
  function segBlockedBy(x1,y1,x2,y2,rects){
    var PAD=6;
    for(var i=0;i<rects.length;i++){
      var r=rects[i];
      var ox1=r.x1-PAD,oy1=r.y1-PAD,ox2=r.x2+PAD,oy2=r.y2+PAD;
      if(Math.abs(x1-x2)<0.5){/* vertical */
        var mnY=Math.min(y1,y2),mxY=Math.max(y1,y2);
        if(x1>ox1&&x1<ox2&&mxY>oy1+1&&mnY<oy2-1)return true;
      } else {/* horizontal */
        var mnX=Math.min(x1,x2),mxX=Math.max(x1,x2);
        if(y1>oy1&&y1<oy2&&mxX>ox1+1&&mnX<ox2-1)return true;
      }
    }
    return false;
  }

  function routePath(ax,ay,bx,by,fs,ts,fromKey,toKey){
    var MARGIN=24;
    var R=8;

    var obsRects=Object.keys(tblPos).filter(function(k){
      return k!==fromKey&&k!==toKey;
    }).map(function(k){return tblRect(k);});

    /* Escape stub — move straight out MARGIN px from anchor */
    var ex=ax,ey=ay,nx=bx,ny=by;
    if(fs==='r')ex=ax+MARGIN; else if(fs==='l')ex=ax-MARGIN;
    else if(fs==='b')ey=ay+MARGIN; else if(fs==='t')ey=ay-MARGIN;
    if(ts==='l')nx=bx-MARGIN; else if(ts==='r')nx=bx+MARGIN;
    else if(ts==='t')ny=by-MARGIN; else if(ts==='b')ny=by+MARGIN;

    /* Build dense orthogonal grid:
       Use card edges ±MARGIN and midpoints between adjacent edges */
    var xSet=new Set(), ySet=new Set();
    /* Always include escape/approach points */
    [ax,ex,bx,nx].forEach(function(v){xSet.add(Math.round(v));});
    [ay,ey,by,ny].forEach(function(v){ySet.add(Math.round(v));});

    Object.keys(tblPos).forEach(function(k){
      var r=tblRect(k);
      var L=Math.round(r.x1-MARGIN), R2=Math.round(r.x2+MARGIN);
      var T=Math.round(r.y1-MARGIN), B=Math.round(r.y2+MARGIN);
      xSet.add(L); xSet.add(R2);
      ySet.add(T); ySet.add(B);
      /* midpoints on each side for finer routing */
      xSet.add(Math.round((r.x1+r.x2)/2));
      ySet.add(Math.round((r.y1+r.y2)/2));
    });

    var xs=Array.from(xSet).sort(function(a,b){return a-b;});
    var ys=Array.from(ySet).sort(function(a,b){return a-b;});

    /* Snap escape/approach to nearest grid point */
    function snap(arr,v){
      var best=arr[0],bd=Math.abs(arr[0]-v);
      arr.forEach(function(x){var d=Math.abs(x-v);if(d<bd){bd=d;best=x;}});
      return best;
    }
    var six=xs.indexOf(snap(xs,ex)), siy=ys.indexOf(snap(ys,ey));
    var tix=xs.indexOf(snap(xs,nx)), tiy=ys.indexOf(snap(ys,ny));

    var W=xs.length,H=ys.length;
    var startNode=siy*W+six, goalNode=tiy*W+tix;

    if(startNode===goalNode){
      return buildPath([[ax,ay],[bx,by]],R);
    }

    /* BFS with step cost = Manhattan distance (prefer shorter segments) */
    var dist=new Array(W*H).fill(Infinity);
    var prev=new Array(W*H).fill(-1);
    var dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    dist[startNode]=0;
    var queue=[startNode], qi=0;

    while(qi<queue.length){
      var cur=queue[qi++];
      if(cur===goalNode)break;
      var ci=cur%W, cj=Math.floor(cur/W);
      var cx=xs[ci], cy=ys[cj];
      for(var d=0;d<4;d++){
        var ni=ci+dirs[d][0], nj=cj+dirs[d][1];
        if(ni<0||ni>=W||nj<0||nj>=H)continue;
        var nid=nj*W+ni;
        if(dist[nid]!==Infinity)continue;
        var nx2=xs[ni], ny2=ys[nj];
        if(segBlockedBy(cx,cy,nx2,ny2,obsRects))continue;
        dist[nid]=dist[cur]+1;
        prev[nid]=cur;
        queue.push(nid);
      }
    }

    var pts=[];
    if(dist[goalNode]===Infinity){
      /* Fallback: simple L-shape ignoring obstacles */
      pts=[[ax,ay],[ex,ey],[ex,ny],[nx,ny],[bx,by]];
    } else {
      var node=goalNode;
      while(node!==-1){
        pts.unshift([xs[node%W],ys[Math.floor(node/W)]]);
        node=prev[node];
      }
      if(pts[0][0]!==ax||pts[0][1]!==ay) pts.unshift([ax,ay]);
      if(pts[pts.length-1][0]!==bx||pts[pts.length-1][1]!==by) pts.push([bx,by]);
    }

    pts=simplify(pts);
    return buildPath(pts,R);
  }

  function simplify(pts){
    if(pts.length<3)return pts;
    var out=[pts[0]];
    for(var i=1;i<pts.length-1;i++){
      var p=pts[i-1],c=pts[i],n=pts[i+1];
      if(!((p[0]===c[0]&&c[0]===n[0])||(p[1]===c[1]&&c[1]===n[1])))out.push(c);
    }
    out.push(pts[pts.length-1]);
    return out;
  }

  function fallbackLine(ax,ay,bx,by,ex,ey,nx,ny){
    return buildPath(simplify([[ax,ay],[ex,ey],[ex,ny],[nx,ny],[bx,by]]),7);
  }

  /* ── Smart label placement ─────────────────────────────────────────────
     For each segment of the routed path, score its midpoint by:
       1. Segment length  — longer segments have more room
       2. Distance from all card rects — prefer open space
       3. Distance from already-placed labels — avoid crowding
     The winner gets a perpendicular offset so the badge sits beside
     the line, not on top of it.
  ──────────────────────────────────────────────────────────────────── */
  var _placedLabels=[];  /* reset per render call */

  function scorePoint(mx,my,segLen,isHoriz,allRects){
    /* 1. Segment length score (normalised, cap at 200px) */
    var lenScore=Math.min(segLen,200)/200;

    /* 2. Clearance from every card rect */
    var minDist=Infinity;
    for(var i=0;i<allRects.length;i++){
      var r=allRects[i];
      var dx=Math.max(0,Math.max(r.x1-mx, mx-r.x2));
      var dy=Math.max(0,Math.max(r.y1-my, my-r.y2));
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<minDist)minDist=d;
    }
    /* inside a card → disqualify */
    if(minDist<2)return -Infinity;
    var clearScore=Math.min(minDist,60)/60;

    /* 3. Separation from previously placed labels */
    var minLblDist=Infinity;
    for(var j=0;j<_placedLabels.length;j++){
      var lbl=_placedLabels[j];
      var d2=Math.sqrt(Math.pow(lbl.x-mx,2)+Math.pow(lbl.y-my,2));
      if(d2<minLblDist)minLblDist=d2;
    }
    var sepScore=_placedLabels.length===0?1:Math.min(minLblDist,80)/80;

    /* Weighted sum — clearance most important, then separation, then length */
    return clearScore*0.5 + sepScore*0.3 + lenScore*0.2;
  }

  function pickLabelPos(pts,allRects){
    if(pts.length<2)return{mx:pts[0][0],my:pts[0][1]};

    var bestScore=-Infinity, bestX=0, bestY=0;
    var PERP=10; /* perpendicular offset from line */

    for(var i=0;i<pts.length-1;i++){
      var p=pts[i], q=pts[i+1];
      var dx=q[0]-p[0], dy=q[1]-p[1];
      var len=Math.sqrt(dx*dx+dy*dy);
      if(len<20)continue; /* too short to place a label */

      /* Skip the first and last stub segments (too close to card edges) */
      if(i===0||i===pts.length-2)continue;

      var isHoriz=Math.abs(dy)<Math.abs(dx);
      var mx=(p[0]+q[0])/2, my=(p[1]+q[1])/2;

      /* Perpendicular offset: push label off the line */
      var px, py;
      if(isHoriz){
        px=mx; py=my-PERP; /* above horizontal segment */
      } else {
        px=mx+PERP; py=my; /* right of vertical segment */
      }

      /* Also try the other side */
      var px2=isHoriz?mx:mx-PERP;
      var py2=isHoriz?my+PERP:my;

      var s1=scorePoint(px,py,len,isHoriz,allRects);
      var s2=scorePoint(px2,py2,len,isHoriz,allRects);

      if(s1>bestScore){bestScore=s1;bestX=px;bestY=py;}
      if(s2>bestScore){bestScore=s2;bestX=px2;bestY=py2;}
    }

    /* Fallback to middle segment midpoint if nothing scored */
    if(bestScore===-Infinity){
      var mid=Math.floor(pts.length/2);
      bestX=(pts[mid-1][0]+pts[mid][0])/2;
      bestY=(pts[mid-1][1]+pts[mid][1])/2;
    }

    _placedLabels.push({x:bestX,y:bestY});
    return{mx:bestX,my:bestY};
  }

  function buildPath(pts,R){
    if(pts.length<2)return{d:'',mx:0,my:0,pts:pts};
    var d='M'+pts[0][0]+','+pts[0][1];
    for(var i=1;i<pts.length-1;i++){
      var p=pts[i-1],c=pts[i],n=pts[i+1];
      var dx1=c[0]-p[0],dy1=c[1]-p[1];
      var dx2=n[0]-c[0],dy2=n[1]-c[1];
      var l1=Math.sqrt(dx1*dx1+dy1*dy1),l2=Math.sqrt(dx2*dx2+dy2*dy2);
      var r=Math.min(R,l1/2,l2/2);
      if(r<1){d+=' L'+c[0]+','+c[1];continue;}
      var bx0=c[0]-r*(dx1/l1),by0=c[1]-r*(dy1/l1);
      var ex0=c[0]+r*(dx2/l2),ey0=c[1]+r*(dy2/l2);
      d+=' L'+bx0.toFixed(1)+','+by0.toFixed(1)+' Q'+c[0]+','+c[1]+' '+ex0.toFixed(1)+','+ey0.toFixed(1);
    }
    d+=' L'+pts[pts.length-1][0]+','+pts[pts.length-1][1];
    return{d:d,mx:0,my:0,pts:pts};  /* mx/my filled in by pickLabelPos after routing */
  }


  var rels=[
    /* ── ORG: col A downward ── */
    ["T000",  "T001",    "1:N","b","t",  undefined, 0,    0   ],
    ["T001",  "T001W",   "1:N","r","l",  undefined, 0,    0   ],
    /* ── ORG: col B downward ── */
    ["T001W", "T001L",   "1:N","b","t",  undefined, -0.4, 0   ],
    ["T001L", "MARD",    "1:N","b","t",  undefined, 0,    0   ],
    /* ── T001W right → 3 targets: T024I(top), CRHD(mid), IFLO(bottom) ── */
    ["T001W", "T024I",   "1:N","r","l",  undefined, -0.5, 0   ],
    ["T001W", "CRHD",    "1:N","r","l",  undefined,  0,   0   ],
    ["T001W", "IFLO",    "1:N","r","l",  undefined,  0.5, 0   ],
    /* ── ORG: col C downward ── */
    ["CRHD",  "CRCO",    "1:N","b","t",  undefined, 0,    0   ],
    /* ── TECH: IFLO col ── */
    ["IFLO",  "ILOA",    "1:1","b","t",  undefined, -0.3, -0.3],
    /* ── TECH: EQUI → IFLO (left side) ── */
    ["EQUI",  "IFLO",    "N:1","l","r",  undefined, -0.4, 0   ],

/* ============================================================ HOVER HIGHLIGHT */
function initErdHighlight(){
  var lines=document.querySelectorAll('.rel-line');
  var hits=document.querySelectorAll('.rel-line-hit');
  var tbls=document.querySelectorAll('.erd-tbl');
  var tooltip=document.getElementById('lineTooltip');

  var lbls=document.querySelectorAll('.rel-lbl');

  /* ── Pinned state: null = nothing pinned ── */
  var pinned=null; /* {type:'card'|'line', key, from, to, card} */

  function applyCardHighlight(key){
    lines.forEach(function(l){
      var connected=l.dataset.from===key||l.dataset.to===key;
      l.style.opacity=connected?'1':'0.05';
      l.style.strokeWidth=connected?'2.8':'1.8';
    });
    lbls.forEach(function(l){
      var connected=l.dataset.from===key||l.dataset.to===key;
      l.style.opacity=connected?'1':'0.05';
    });
    tbls.forEach(function(t){
      if(t.dataset.t===key){t.classList.remove('hl-dim');return;}
      var tKey=t.dataset.t,linked=false;
      lines.forEach(function(l){
        if((l.dataset.from===key&&l.dataset.to===tKey)||(l.dataset.to===key&&l.dataset.from===tKey))linked=true;
      });
      t.classList.toggle('hl-active',linked);
      t.classList.toggle('hl-dim',!linked);
    });
  }

  function applyLineHighlight(from,to){
    lines.forEach(function(l){
      var match=l.dataset.from===from&&l.dataset.to===to;
      l.style.opacity=match?'1':'0.05';
      l.style.strokeWidth=match?'3':'1.8';
    });
    lbls.forEach(function(l){
      var match=l.dataset.from===from&&l.dataset.to===to;
      l.style.opacity=match?'1':'0.05';
    });
    tbls.forEach(function(t){
      var k=t.dataset.t,isEnd=(k===from||k===to);
      t.classList.toggle('hl-active',isEnd);
      t.classList.toggle('hl-dim',!isEnd);
    });
  }

  function resetAll(){
    lines.forEach(function(l){l.style.opacity='0.55';l.style.strokeWidth='1.8';});
    lbls.forEach(function(l){l.style.opacity='0.9';});
    tbls.forEach(function(t){t.classList.remove('hl-active','hl-dim','hl-pinned');});
    if(tooltip)tooltip.className='line-tooltip';
  }

  function showLineTooltip(from,to,card,e){
    if(!tooltip)return;
    var fromData=ERD[from]||{},toData=ERD[to]||{};
    var fromColor=COLORS[(fromData.color)||'teal'];
    var toColor=COLORS[(toData.color)||'teal'];
    tooltip.innerHTML=
      '<span class="lt-card" style="background:'+fromColor.bg+';color:'+fromColor.fg+'">'+from+'</span>'+
      '<span class="lt-rel">'+card+'</span>'+
      '<span class="lt-card" style="background:'+toColor.bg+';color:'+toColor.fg+'">'+to+'</span>'+
      '<span style="color:var(--text3);margin-left:6px;font-size:9px">'+(fromData.desc||'')+'  →  '+(toData.desc||'')+'</span>'+
      '<span style="color:var(--text3);margin-left:10px;font-size:9px;opacity:.6">(click to pin)</span>';
    tooltip.className='line-tooltip show';
    if(e)moveTip(e);
  }

  /* ── Table events ── */
  tbls.forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var key=this.dataset.t;
      if(pinned&&pinned.type==='card'&&pinned.key===key){
        /* click same card → unpin */
        pinned=null;
        resetAll();
        tbls.forEach(function(t){t.classList.remove('hl-pinned');});
      } else {
        pinned={type:'card',key:key};
        tbls.forEach(function(t){t.classList.remove('hl-pinned');});
        el.classList.add('hl-pinned');
        applyCardHighlight(key);
        if(tooltip)tooltip.className='line-tooltip';
      }
    });
    el.addEventListener('mouseenter',function(){
      if(pinned)return; /* don't override pinned state */
      applyCardHighlight(this.dataset.t);
    });
    el.addEventListener('mouseleave',function(){
      if(pinned)return;
      resetAll();
    });
  });

  /* ── Line events ── */
  hits.forEach(function(hit){
    hit.addEventListener('click',function(e){
      e.stopPropagation();
      var from=this.dataset.from,to=this.dataset.to,card=this.dataset.card;
      if(pinned&&pinned.type==='line'&&pinned.from===from&&pinned.to===to){
        /* click same line → unpin */
        pinned=null;
        resetAll();
      } else {
        pinned={type:'line',from:from,to:to,card:card};
        tbls.forEach(function(t){t.classList.remove('hl-pinned');});
        applyLineHighlight(from,to);
        showLineTooltip(from,to,card,null);
        /* anchor tooltip to centre of viewport instead of cursor */
        if(tooltip){tooltip.style.left='50%';tooltip.style.top='80px';tooltip.style.transform='translateX(-50%)';}
      }
    });
    hit.addEventListener('mouseenter',function(e){
      if(pinned)return;
      var from=this.dataset.from,to=this.dataset.to,card=this.dataset.card;
      applyLineHighlight(from,to);
      showLineTooltip(from,to,card,e);
    });
    hit.addEventListener('mousemove',function(e){
      if(pinned)return;
      moveTip(e);
    });
    hit.addEventListener('mouseleave',function(){
      if(pinned)return;
      resetAll();
      if(tooltip)tooltip.className='line-tooltip';
    });
  });

  /* ── Click canvas background → unpin ── */
  var canvas=document.querySelector('.erd-canvas');
  if(canvas){
    canvas.addEventListener('click',function(){
      if(pinned){pinned=null;resetAll();tbls.forEach(function(t){t.classList.remove('hl-pinned');});}
    });
  }

  function moveTip(e){
    if(!tooltip)return;
    var x=e.clientX+14,y=e.clientY-36;
    /* keep inside viewport */
    if(x+tooltip.offsetWidth>window.innerWidth-10)x=e.clientX-tooltip.offsetWidth-10;
    if(y<8)y=e.clientY+16;
    tooltip.style.left=x+'px';
    tooltip.style.top=y+'px';
  }
}
